version: '3.8'

services:
  studentmanagement-api:
    build:
      context: .
      dockerfile: StudentManagement.Api/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
    depends_on:
      - sqlserver
    networks:
      - studentmanagement-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=StudentManagement123!
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - studentmanagement-network

volumes:
  sqlserver_data:

networks:
  studentmanagement-network:
    driver: bridge
